<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameflix</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --red:#e50914;
  --bg:#141414;
  --gray:#aaa;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);
}
.header{
  display:flex;
  align-items:center;
  gap:20px;
  padding:15px 4%;
}
.logo{
  font-size:28px;
  font-weight:bold;
  color:var(--red);
}
nav a{
  color:#eee;
  margin-right:15px;
  text-decoration:none;
  font-size:14px;
}

/* BANNER */
.banner{
  height:80vh;
  position:relative;
  display:flex;
  align-items:center;
  padding:0 4%;
}
.banner video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}
.banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.9),rgba(0,0,0,.2));
  z-index:-1;
}
.banner-content{
  max-width:600px;
}
.banner-content h1{
  font-size:3rem;
}
.banner-content p{
  color:#ddd;
}
.banner button{
  padding:10px 25px;
  border:none;
  font-size:18px;
  font-weight:bold;
  border-radius:4px;
  cursor:pointer;
}
.btn-play{background:#fff;color:#000}
.btn-info{background:rgba(109,109,110,.7);color:#fff}

/* ROW */
.row{
  padding:30px 4%;
}
.row h2{
  font-size:20px;
  margin-bottom:15px;
}

/* TOP 10 */
.top10-wrapper{
  position:relative;
}
.top10{
  display:flex;
  gap:45px;
  overflow-x:auto;
  scroll-behavior:smooth;
}
.top10::-webkit-scrollbar{display:none}

.top-card{
  min-width:300px;
  height:260px;
  position:relative;
  cursor:pointer;
}
.rank{
  position:absolute;
  font-size:260px;
  bottom:-40px;
  left:-20px;
  color:#000;
  -webkit-text-stroke:6px #666;
}
.top-card img{
  width:180px;
  height:260px;
  object-fit:cover;
  margin-left:110px;
  border-radius:4px;
}

/* ARROWS */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,.6);
  border:none;
  color:#fff;
  font-size:30px;
  width:40px;
  height:60px;
  cursor:pointer;
  z-index:5;
}
.arrow.left{left:0}
.arrow.right{right:0}

/* GAMES GRID */
.games{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
}
.games img{
  width:calc((100% / 9) - 14px);
  height:307px;
  object-fit:cover;
  border-radius:4px;
  cursor:pointer;
  transition:.3s;
}
.games img:hover{transform:scale(1.08)}

/* CTA */
.cta{
  text-align:center;
  margin:40px 0;
}
.cta button{
  padding:20px 55px;
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,#e50914,#ff3b3b);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .games img{
    width:calc((100% / 3) - 14px);
    height:200px;
  }
  .rank{font-size:120px}
}
</style>
</head>

<body>

<header>
  <div class="header">
    <div class="logo">GAMEFLIX</div>
    <nav>
      <a href="#">Início</a>
      <a href="#">FPS</a>
      <a href="#">RPG</a>
      <a href="#">Corrida</a>
    </nav>
  </div>
</header>

<section class="banner">
  <video id="bannerVideo" autoplay muted loop>
    <source src="https://res.cloudinary.com/dlt1gqwnc/video/upload/v1771613996/farcry_z2rivm.mp4">
  </video>
  <div class="banner-content">
    <h1 id="bannerTitle">Far Cry Primal</h1>
    <p id="bannerDesc">Jogo grátis para testar a plataforma</p>
    <button class="btn-play">▶ DOWNLOAD</button>
    <button class="btn-info">ⓘ INFO</button>
  </div>
</section>

<div class="row">
  <h2>TOP 10 GAMEFLIX</h2>

  <div class="top10-wrapper">
    <button class="arrow left">‹</button>
    <button class="arrow right">›</button>

    <div class="top10" id="top10">
      <div class="top-card" data-title="Red Dead Redemption 2"
           data-desc="Crime e ação em mundo aberto"
           data-video="https://res.cloudinary.com/dlt1gqwnc/video/upload/v1771734264/red_dead_2_hsqfm7.mp4">
        <span class="rank">1</span>
        <img src="https://upload.wikimedia.org/wikipedia/pt/e/e7/Red_Dead_Redemption_2.png">
      </div>

      <div class="top-card" data-title="God of War Ragnarok"
           data-desc="Kratos e Atreus"
           data-video="https://res.cloudinary.com/dlt1gqwnc/video/upload/v1771613996/farcry_z2rivm.mp4">
        <span class="rank">2</span>
        <img src="https://gmedia.playstation.com/is/image/SIEPDC/god-of-war-ragnarok-store-art-01-10sep21">
      </div>
    </div>
  </div>
</div>

<div class="row">
  <h2>CATÁLOGO COMPLETO</h2>
  <div class="games" id="games">
    <img src="https://m.media-amazon.com/images/M/MV5BODIwYWZmYWMtYTliNC00YWQ5LTg5ZmEtNTZhNmUxNjdiMzNiXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg">
    <img src="https://media.rockstargames.com/rockstargames/img/global/news/upload/actual_1421771177.jpg">
    <img src="https://image.api.playstation.com/vulcan/ap/rnd/202111/2001/9Vdas199J3tqxTIBWGijbpjW.png">
    <img src="https://meups.com.br/wp-content/uploads/2025/10/Battlefield-6-REVIEW-PS5-scaled.jpg">
    <img src="https://assets.nintendo.com/image/upload/q_auto/f_auto/store/software/switch/70010000089518/cc83ebef3be669c8fcc66f9c53e3c6e6dabf5cbc44947c9e1c7e5febeb254ee6">
  </div>
</div>

<div class="cta">
  <button>COMPRAR AGORA</button>
</div>

<script>
const title = document.getElementById("bannerTitle");
const desc = document.getElementById("bannerDesc");
const video = document.getElementById("bannerVideo");

document.querySelectorAll(".top-card").forEach(card=>{
  card.addEventListener("click",()=>{
    title.textContent = card.dataset.title;
    desc.textContent = card.dataset.desc;
    video.src = card.dataset.video;
    video.play();
  });
});

const top10 = document.getElementById("top10");
document.querySelector(".arrow.left").onclick=()=>top10.scrollBy({left:-400,behavior:"smooth"});
document.querySelector(".arrow.right").onclick=()=>top10.scrollBy({left:400,behavior:"smooth"});
</script>

</body>
</html>
