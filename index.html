<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEFLIX - Método Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #e50914; --bg-black: #000000; }
        
        /* AJUSTE PARA CENTRALIZAÇÃO VERTICAL E HORIZONTAL */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; 
            height: 100%; /* Ocupa a altura toda da tela */
            background-color: var(--bg-black); 
            font-family: 'Roboto', sans-serif; 
            color: #fff; 
            display: flex; 
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente (O QUE FALTOU) */
            overflow-x: hidden; 
        }

        .container { 
            max-width: 850px; 
            width: 90%; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center; 
            padding: 20px 0; 
        }
        
        .headline { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 2.8rem; 
            line-height: 1.1; 
            margin-bottom: 25px; 
            color: #ffffff; 
            text-transform: uppercase;
        }
        .headline span { color: var(--primary-red); }

        .video-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 750px; 
            padding-bottom: 56.25%; 
            background: #111; 
            border-radius: 8px; 
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.2); 
            overflow: hidden; 
            border: 1px solid #222; 
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

        .video-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; cursor: pointer; 
            background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .audio-icon { width: 60px; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        .overlay-text { font-family: 'Bebas Neue', sans-serif; font-size: 22px; background: var(--primary-red); padding: 12px 24px; border-radius: 4px; animation: pulse 1.5s infinite; }

        #cta-container { margin-top: 40px; display: none; width: 100%; animation: surge 0.8s ease-out; }
        .netflix-btn { 
            display: inline-block; padding: 20px 0; width: 100%; max-width: 450px;
            font-size: 22px; font-weight: bold; text-transform: uppercase; 
            color: #fff; background: linear-gradient(90deg, #e50914, #ff3b3b); 
            border: none; border-radius: 5px; text-decoration: none; 
            box-shadow: 0 0 20px #e50914, 0 0 40px #ff3b3b; animation: float 2.5s ease-in-out infinite; 
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes surge { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 600px) {
            body, html { align-items: center; } /* Garante centro no mobile */
            .container { width: 92%; }
            .headline { font-size: 1.8rem; }
            .netflix-btn { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="headline">ASSISTA ESSE VIDEO CURTO <span>PARA ACESSAR</span> A GAMEFLIX</h1>
        
        <div class="video-wrapper">
            <div class="video-overlay" id="overlay" onclick="startVideo()">
                <img src="https://cdn-icons-png.flaticon.com/512/461/461238.png" class="audio-icon" style="filter: invert(1);">
                <div class="overlay-text">CLIQUE PARA OUVIR</div>
            </div>
            <div id="player"></div>
        </div>

        <div id="cta-container">
            <a href="http://www.gameflixoficial.com.br/" class="netflix-btn">VEJA NOSSOS PLANOS</a>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const VIDEO_ID = 'ASzOzrB-a9E'; 
        const DELAY = 10000; 
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: VIDEO_ID,
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'mute': 1 }
            });
        }
        function startVideo() {
            document.getElementById('overlay').style.display = 'none';
            player.unMute();
            player.seekTo(0);
            player.playVideo();
            setTimeout(() => { document.getElementById('cta-container').style.display = 'block'; }, DELAY);
        }
    </script>
</body>
</html>
